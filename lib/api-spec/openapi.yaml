openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Jack — AI Trade Intelligence Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: videos
    description: Video library operations
  - name: search
    description: Semantic search operations
  - name: chat
    description: Ask Jack conversational AI
  - name: competencies
    description: Red Seal competency mapping
  - name: interview
    description: Jack Interview Mode — conversational knowledge capture from mentors

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /videos:
    get:
      operationId: listVideos
      tags: [videos]
      summary: List all videos in the knowledge library
      parameters:
        - name: trade
          in: query
          schema:
            type: string
          description: Filter by trade category
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, transcribing, analyzing, ready, error]
          description: Filter by processing status
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoList"
    post:
      operationId: createVideo
      tags: [videos]
      summary: Register a new video upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"

  /videos/stats:
    get:
      operationId: getVideoStats
      tags: [videos]
      summary: Get library statistics (total videos, by trade, by status)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoStats"

  /videos/recent:
    get:
      operationId: getRecentVideos
      tags: [videos]
      summary: Get recently added or analyzed videos
      responses:
        "200":
          description: Recent videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /videos/{id}:
    get:
      operationId: getVideo
      tags: [videos]
      summary: Get a single video with its transcript and analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoDetail"
        "404":
          description: Not found
    patch:
      operationId: updateVideo
      tags: [videos]
      summary: Update video metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoUpdate"
      responses:
        "200":
          description: Updated video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
    delete:
      operationId: deleteVideo
      tags: [videos]
      summary: Delete a video and all its data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /videos/{id}/transcribe:
    post:
      operationId: transcribeVideo
      tags: [videos]
      summary: Trigger AI transcription via Whisper
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Transcription queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"

  /videos/{id}/analyze:
    post:
      operationId: analyzeVideo
      tags: [videos]
      summary: Trigger GPT-4 analysis and Red Seal competency mapping
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Analysis queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"

  /videos/{id}/related:
    get:
      operationId: fetchRelatedVideos
      tags: [videos]
      summary: Get semantically related videos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Related videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /videos/{id}/upload-url:
    post:
      operationId: getUploadUrl
      tags: [videos]
      summary: Get a signed Supabase Storage upload URL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Signed upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /search:
    post:
      operationId: semanticSearch
      tags: [search]
      summary: Semantic search across the knowledge library using RAG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchInput"
      responses:
        "200":
          description: Search results with timestamp citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /chat:
    post:
      operationId: askJack
      tags: [chat]
      summary: Ask Jack a question — searches internal library first, then answers with citations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: Jack's answer with citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /chat/history:
    get:
      operationId: getChatHistory
      tags: [chat]
      summary: Get chat history for the caller's session (identified by HttpOnly cookie)
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

  /competencies:
    get:
      operationId: listCompetencies
      tags: [competencies]
      summary: List all Red Seal competency categories
      responses:
        "200":
          description: Competencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competency"

  /competencies/{code}/videos:
    get:
      operationId: getVideosByCompetency
      tags: [competencies]
      summary: Get all videos mapped to a Red Seal competency code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Videos for competency
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /graph:
    get:
      operationId: getGraph
      tags: [graph]
      summary: Get the persisted Living Memory knowledge graph
      responses:
        "200":
          description: Knowledge graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeGraph"

  /graph/nodes/{id}/verification:
    patch:
      operationId: setNodeVerification
      tags: [graph]
      summary: Set the human verification status of a distilled knowledge node (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationUpdate"
      responses:
        "200":
          description: Updated knowledge node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeNode"

  /interview/sessions:
    post:
      operationId: startInterview
      tags: [interview]
      summary: Create a mentor profile and start an interview session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartInterviewInput"
      responses:
        "201":
          description: Interview session started with the first question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSession"

  /interview/sessions/{id}:
    get:
      operationId: getInterviewSession
      tags: [interview]
      summary: Get the current state of an interview session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The interview session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSession"
        "404":
          description: Session not found

  /interview/sessions/{id}/answers:
    post:
      operationId: submitInterviewAnswer
      tags: [interview]
      summary: Submit the mentor's answer to the current question and get the next one
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerInput"
      responses:
        "200":
          description: The saved answer, distilled knowledge, and the updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewTurnResult"
        "404":
          description: Session not found

  /interview/sessions/{id}/skip:
    post:
      operationId: skipInterviewQuestion
      tags: [interview]
      summary: Skip the current question and get the next one
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The skipped answer record and the updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewTurnResult"
        "404":
          description: Session not found

  /interview/sessions/{id}/finish:
    post:
      operationId: finishInterview
      tags: [interview]
      summary: End the interview session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The completed interview session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSession"
        "404":
          description: Session not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Video:
      type: object
      required: [id, title, status, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        trade:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        duration:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, transcribing, analyzing, ready, error]
        competencyCodes:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    VideoDetail:
      type: object
      required: [id, title, status, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        trade:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        duration:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, transcribing, analyzing, ready, error]
        competencyCodes:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        transcript:
          type: ["string", "null"]
        segments:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptSegment"
        analysis:
          type: ["string", "null"]
        keyPoints:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    VideoList:
      type: object
      required: [videos, total]
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        total:
          type: integer

    VideoInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        trade:
          type: string
        tags:
          type: array
          items:
            type: string

    VideoUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        trade:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [pending, transcribing, analyzing, ready, error]

    VideoStats:
      type: object
      required: [total, byStatus, byTrade]
      properties:
        total:
          type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        byTrade:
          type: object
          additionalProperties:
            type: integer
        totalDuration:
          type: ["number", "null"]

    TranscriptSegment:
      type: object
      required: [id, startTime, endTime, text]
      properties:
        id:
          type: string
        startTime:
          type: number
        endTime:
          type: number
        text:
          type: string
        confidence:
          type: ["number", "null"]

    JobStatus:
      type: object
      required: [jobId, status, videoId]
      properties:
        jobId:
          type: string
        status:
          type: string
        videoId:
          type: string
        message:
          type: ["string", "null"]

    SearchInput:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
        trade:
          type: ["string", "null"]
        limit:
          type: integer
          default: 10

    SearchResults:
      type: object
      required: [results, query]
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"

    SearchResult:
      type: object
      required: [videoId, videoTitle, text, startTime, endTime, score]
      properties:
        videoId:
          type: string
        videoTitle:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        text:
          type: string
        startTime:
          type: number
        endTime:
          type: number
        score:
          type: number
        trade:
          type: ["string", "null"]

    ChatInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1

    ChatResponse:
      type: object
      required: [answer, citations]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        usedInternalKnowledge:
          type: boolean

    Citation:
      type: object
      required: [videoId, videoTitle, startTime, endTime, text]
      properties:
        videoId:
          type: string
        videoTitle:
          type: string
        startTime:
          type: number
        endTime:
          type: number
        text:
          type: string
        thumbnailUrl:
          type: ["string", "null"]

    ChatMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        createdAt:
          type: string

    Competency:
      type: object
      required: [code, name, trade]
      properties:
        code:
          type: string
        name:
          type: string
        trade:
          type: string
        description:
          type: ["string", "null"]
        videoCount:
          type: integer

    UploadUrlRequest:
      type: object
      required: [filename, contentType]
      properties:
        filename:
          type: string
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadUrl, path]
      properties:
        uploadUrl:
          type: string
        path:
          type: string
        token:
          type: ["string", "null"]

    VerificationUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [verified, rejected, unverified]

    KnowledgeNode:
      type: object
      required:
        [id, kind, label, description, confidence, verificationStatus, meta, createdAt, updatedAt]
      properties:
        id:
          type: string
        kind:
          type: string
          enum:
            [
              core,
              topic,
              competency,
              video,
              mentor,
              concept,
              tool,
              equipment,
              material,
              procedure,
              hazard,
              slang,
              certification,
              standard,
              regional_term,
            ]
        label:
          type: string
        trade:
          type: ["string", "null"]
        refId:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        verificationStatus:
          type: string
        meta:
          type: object
          additionalProperties: true
        createdAt:
          type: string
        updatedAt:
          type: string

    KnowledgeEdge:
      type: object
      required: [id, source, target, kind, meta]
      properties:
        id:
          type: string
        source:
          type: string
        target:
          type: string
        kind:
          type: string
        weight:
          type: number
        meta:
          type: object
          additionalProperties: true

    KnowledgeGraph:
      type: object
      required: [nodes, edges, counts, generatedAt]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeEdge"
        counts:
          type: object
          required: [nodes, edges, topics, competencies, videos, knowledge]
          properties:
            nodes:
              type: integer
            edges:
              type: integer
            topics:
              type: integer
            competencies:
              type: integer
            videos:
              type: integer
            knowledge:
              type: integer
        generatedAt:
          type: string

    MentorProfile:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        trade:
          type: ["string", "null"]
        tradeInput:
          type: ["string", "null"]
        yearsExperience:
          type: ["integer", "null"]
        specialties:
          type: array
          items:
            type: string
        region:
          type: ["string", "null"]
        background:
          type: ["string", "null"]
        createdAt:
          type: string

    StartInterviewInput:
      type: object
      required: [name, trade]
      properties:
        name:
          type: string
          description: The mentor's name
        trade:
          type: string
          description: Selected trade (e.g. Welding, Heavy Equipment Operator, Other)
        tradeInput:
          type: ["string", "null"]
          description: Free-text trade when "Other" is selected
        yearsExperience:
          type: ["integer", "null"]
        specialties:
          type: array
          items:
            type: string
        region:
          type: ["string", "null"]
        background:
          type: ["string", "null"]

    SubmitAnswerInput:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
          description: The mentor's verbatim answer to the current question

    InterviewSession:
      type: object
      required:
        [id, mentorProfileId, mentorName, status, questionCount, complete, createdAt]
      properties:
        id:
          type: string
        mentorProfileId:
          type: string
        mentorName:
          type: string
        trade:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, completed]
        currentQuestion:
          type: ["string", "null"]
        currentCategory:
          type: ["string", "null"]
        currentTopic:
          type: ["string", "null"]
        questionCount:
          type: integer
        complete:
          type: boolean
          description: True when there are no further questions (interview finished)
        createdAt:
          type: string

    InterviewAnswer:
      type: object
      required: [id, question, skipped, createdAt]
      properties:
        id:
          type: string
        question:
          type: string
        category:
          type: ["string", "null"]
        topic:
          type: ["string", "null"]
        answerText:
          type: ["string", "null"]
        skipped:
          type: boolean
        createdAt:
          type: string

    ExtractedKnowledgeItem:
      type: object
      required: [id, title, category, confidence]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        confidence:
          type: number
        competencyCode:
          type: ["string", "null"]

    InterviewTurnResult:
      type: object
      required: [session, answer, extractedKnowledge]
      properties:
        session:
          $ref: "#/components/schemas/InterviewSession"
        answer:
          $ref: "#/components/schemas/InterviewAnswer"
        extractedKnowledge:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedKnowledgeItem"
