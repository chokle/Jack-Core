openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Jack — AI Trade Intelligence Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: videos
    description: Video library operations
  - name: search
    description: Semantic search operations
  - name: chat
    description: Ask Jack conversational AI
  - name: competencies
    description: Red Seal competency mapping
  - name: interview
    description: Jack Interview Mode — conversational knowledge capture from mentors
  - name: parking-lot
    description: Park an interrupted thought during a chat or interview and resume it later
  - name: system
    description: Live Systems Health telemetry (heartbeat widget)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /system-health:
    get:
      operationId: getSystemHealth
      tags: [system]
      summary: Live Systems Health snapshot
      description: >-
        Coarse, DB-free telemetry snapshot for the heartbeat widget. Returns
        only presentation-level fields (no raw CPU/RAM/queue internals).
      responses:
        "200":
          description: Current Systems Health snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemHealthSnapshot"

  /videos:
    get:
      operationId: listVideos
      tags: [videos]
      summary: List all videos in the knowledge library
      parameters:
        - name: trade
          in: query
          schema:
            type: string
          description: Filter by trade category
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, uploading, uploaded, transcribing, analyzing, indexing, completed, failed, retrying]
          description: Filter by processing status
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoList"
    post:
      operationId: createVideo
      tags: [videos]
      summary: Register a new video upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"

  /videos/stats:
    get:
      operationId: getVideoStats
      tags: [videos]
      summary: Get library statistics (total videos, by trade, by status)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoStats"

  /videos/recent:
    get:
      operationId: getRecentVideos
      tags: [videos]
      summary: Get recently added or analyzed videos
      responses:
        "200":
          description: Recent videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /videos/{id}:
    get:
      operationId: getVideo
      tags: [videos]
      summary: Get a single video with its transcript and analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoDetail"
        "404":
          description: Not found
    patch:
      operationId: updateVideo
      tags: [videos]
      summary: Update video metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoUpdate"
      responses:
        "200":
          description: Updated video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
    delete:
      operationId: deleteVideo
      tags: [videos]
      summary: Delete a video and all its data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /videos/{id}/transcribe:
    post:
      operationId: transcribeVideo
      tags: [videos]
      summary: Trigger AI transcription via Whisper
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Transcription queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"

  /videos/{id}/analyze:
    post:
      operationId: analyzeVideo
      tags: [videos]
      summary: Trigger GPT-4 analysis and Red Seal competency mapping
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Analysis queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"

  /videos/{id}/related:
    get:
      operationId: fetchRelatedVideos
      tags: [videos]
      summary: Get semantically related videos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Related videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /videos/{id}/upload-url:
    post:
      operationId: getUploadUrl
      tags: [videos]
      summary: Get a signed Supabase Storage upload URL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Signed upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /search:
    post:
      operationId: semanticSearch
      tags: [search]
      summary: Semantic search across the knowledge library using RAG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchInput"
      responses:
        "200":
          description: Search results with timestamp citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /chat:
    post:
      operationId: askJack
      tags: [chat]
      summary: Ask Jack a question — searches internal library first, then answers with citations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: Jack's answer with citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /chat/history:
    get:
      operationId: getChatHistory
      tags: [chat]
      summary: Get chat history for the caller's session (identified by HttpOnly cookie)
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

  /competencies:
    get:
      operationId: listCompetencies
      tags: [competencies]
      summary: List all Red Seal competency categories
      responses:
        "200":
          description: Competencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competency"

  /competencies/{code}/videos:
    get:
      operationId: getVideosByCompetency
      tags: [competencies]
      summary: Get all videos mapped to a Red Seal competency code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Videos for competency
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /graph:
    get:
      operationId: getGraph
      tags: [graph]
      summary: Get the persisted Living Memory knowledge graph
      responses:
        "200":
          description: Knowledge graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeGraph"

  /graph/candidates:
    get:
      operationId: listKnowledgeCandidates
      tags: [graph]
      summary: List mentor-concept candidates queued for review (read-only)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, accepted, rejected, merged, archived, restored]
            default: pending
          description: >-
            pending is publicly readable; every other status (including
            archived — mentor-withdrawn concepts held out of the live graph,
            and restored — archived concepts a reviewer re-minted into the
            graph) requires an admin session.
      responses:
        "200":
          description: Queued knowledge candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeCandidateList"

  /graph/candidates/{id}/resolve:
    post:
      operationId: resolveKnowledgeCandidate
      tags: [graph]
      summary: Resolve a pending knowledge candidate — Accept / Merge / Reject (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateResolutionInput"
      responses:
        "200":
          description: The resolved candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeCandidate"
        "400":
          description: Invalid resolution (missing reason/target, or bad target node)
        "404":
          description: Candidate not found
        "409":
          description: >-
            Conflict — either the candidate was already resolved with a
            different outcome (code=already_resolved), or the requested target
            concept no longer exists in the live graph and nothing confidently
            replaces it (code=target_gone; the candidate STAYS pending and
            bestMatches carries fresh near matches to choose from).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateResolutionConflict"

  /graph/nodes/{id}/verification:
    patch:
      operationId: setNodeVerification
      tags: [graph]
      summary: Set the human verification status of a distilled knowledge node (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationUpdate"
      responses:
        "200":
          description: Updated knowledge node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeNode"

  /interview/sessions:
    post:
      operationId: startInterview
      tags: [interview]
      summary: Create a mentor profile and start an interview session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartInterviewInput"
      responses:
        "201":
          description: Interview session started with the first question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSession"

  /interview/sessions/{id}:
    get:
      operationId: getInterviewSession
      tags: [interview]
      summary: Get the current state of an interview session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The interview session with its ordered prior answers (for resume)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionDetail"
        "404":
          description: Session not found

  /interview/sessions/{id}/answers:
    post:
      operationId: submitInterviewAnswer
      tags: [interview]
      summary: Submit the mentor's answer to the current question and get the next one
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerInput"
      responses:
        "200":
          description: The saved answer, distilled knowledge, and the updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewTurnResult"
        "404":
          description: Session not found

  /interview/sessions/{id}/skip:
    post:
      operationId: skipInterviewQuestion
      tags: [interview]
      summary: Skip the current question and get the next one
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The skipped answer record and the updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewTurnResult"
        "404":
          description: Session not found

  /interview/mentors:
    get:
      operationId: listMentors
      tags: [interview]
      summary: List mentor profiles with contribution counts (admin only)
      responses:
        "200":
          description: Mentor profiles ordered newest-first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorList"
        "401":
          description: Admin session required

  /interview/mentors/{id}/active-session:
    get:
      operationId: getMentorActiveSession
      tags: [interview]
      summary: Get a mentor's in-progress (incomplete) interview session, if any
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: >-
            The mentor's active (incomplete) interview session, or an empty
            object when they have none — used to offer "Resume Interview" on
            their node in the Living Memory graph.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorActiveSession"

  /interview/mentors/{id}/withdraw:
    post:
      operationId: withdrawMentor
      tags: [interview]
      summary: Withdraw a mentor — remove their personal data and re-evaluate the Living Memory graph (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Withdrawal summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorWithdrawalResult"
        "404":
          description: Mentor not found (or already withdrawn)

  /interview/mentors/{id}/withdrawal-preview:
    get:
      operationId: previewMentorWithdrawal
      tags: [interview]
      summary: Preview the impact of withdrawing a mentor without making any changes (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dry-run projection of the withdrawal impact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorWithdrawalPreview"
        "401":
          description: Admin session required
        "404":
          description: Mentor not found

  /interview/sessions/{id}/finish:
    post:
      operationId: finishInterview
      tags: [interview]
      summary: End the interview session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The completed interview session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSession"
        "404":
          description: Session not found

  /interview/answers/{id}/redistill:
    post:
      operationId: redistillInterviewAnswer
      tags: [interview]
      summary: Re-run distillation + verification for a single answer (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The answer with its refreshed distillation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedistillAnswerResult"
        "401":
          description: Admin session required
        "404":
          description: Answer or mentor not found
        "409":
          description: The answer was skipped or has no content to distill

  /graph/health:
    get:
      operationId: getGraphHealth
      tags: [graph]
      summary: Knowledge-write health — verified/partial/failed counts, retry queue, recent writes (admin only)
      responses:
        "200":
          description: Graph write health report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphHealthReport"
        "401":
          description: Admin session required

  /parking-lot:
    post:
      operationId: parkThought
      tags: [parking-lot]
      summary: Save a snapshot of an interrupted chat or interview thought
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParkThoughtInput"
      responses:
        "201":
          description: The saved parked thought
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkedThought"
        "400":
          description: Invalid input, or interviewSessionId missing/unknown for an interview-sourced thought
        "429":
          description: Too many requests
    get:
      operationId: listParkedThoughts
      tags: [parking-lot]
      summary: List parked thoughts visible to the caller
      description: >-
        Chat-sourced rows are scoped to the caller's jack_session cookie;
        interview-sourced rows are public, consistent with the rest of the
        app's interview/mentor data.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [parked, resumed, resolved]
        - name: mentorProfileId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Parked thoughts, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkedThoughtList"

  /parking-lot/{id}/resume:
    post:
      operationId: resumeParkedThought
      tags: [parking-lot]
      summary: Mark a parked thought resumed and return it for context restore
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The parked thought, now resumed (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkedThought"
        "404":
          description: Not found (or a chat-sourced thought owned by a different session)

  /parking-lot/{id}/archive:
    post:
      operationId: archiveParkedThought
      tags: [parking-lot]
      summary: Mark a parked thought resolved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The parked thought, now resolved (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkedThought"
        "404":
          description: Not found (or a chat-sourced thought owned by a different session)

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SystemHealthSnapshot:
      type: object
      description: Coarse Systems Health telemetry for the heartbeat widget.
      required: [vitalityScore, heartbeatBPM, pulseColor, status, state]
      properties:
        vitalityScore:
          type: integer
          minimum: 0
          maximum: 100
          description: 0..100 health index (100 = healthy). Activity is conveyed by state/BPM.
        heartbeatBPM:
          type: integer
          description: Beats per minute for the animated heartbeat.
        pulseColor:
          type: string
          enum: [green, purple, orange, red]
        status:
          type: string
          enum: [Healthy, Listening, Searching Memory, Reasoning, Writing Memory, Warning]
        state:
          type: string
          enum: [idle, listening, searching, reasoning, writing, error]

    Video:
      type: object
      required: [id, title, status, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        trade:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        duration:
          type: ["number", "null"]
        status:
          type: string
          enum: [queued, uploading, uploaded, transcribing, analyzing, indexing, completed, failed, retrying]
        competencyCodes:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        attempts:
          type: ["integer", "null"]
        lastError:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    VideoDetail:
      type: object
      required: [id, title, status, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        trade:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        duration:
          type: ["number", "null"]
        status:
          type: string
          enum: [queued, uploading, uploaded, transcribing, analyzing, indexing, completed, failed, retrying]
        competencyCodes:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        attempts:
          type: ["integer", "null"]
        lastError:
          type: ["string", "null"]
        transcript:
          type: ["string", "null"]
        segments:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptSegment"
        analysis:
          type: ["string", "null"]
        keyPoints:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    VideoList:
      type: object
      required: [videos, total]
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        total:
          type: integer

    VideoInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        trade:
          type: string
        tags:
          type: array
          items:
            type: string

    VideoUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        trade:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [queued, uploading, uploaded, transcribing, analyzing, indexing, completed, failed, retrying]

    VideoStats:
      type: object
      required: [total, byStatus, byTrade]
      properties:
        total:
          type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        byTrade:
          type: object
          additionalProperties:
            type: integer
        totalDuration:
          type: ["number", "null"]

    TranscriptSegment:
      type: object
      required: [id, startTime, endTime, text]
      properties:
        id:
          type: string
        startTime:
          type: number
        endTime:
          type: number
        text:
          type: string
        confidence:
          type: ["number", "null"]

    JobStatus:
      type: object
      required: [jobId, status, videoId]
      properties:
        jobId:
          type: string
        status:
          type: string
        videoId:
          type: string
        message:
          type: ["string", "null"]

    SearchInput:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
        trade:
          type: ["string", "null"]
        limit:
          type: integer
          default: 10

    SearchResults:
      type: object
      required: [results, query]
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"

    SearchResult:
      type: object
      required: [videoId, videoTitle, text, startTime, endTime, score]
      properties:
        videoId:
          type: string
        videoTitle:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        text:
          type: string
        startTime:
          type: number
        endTime:
          type: number
        score:
          type: number
        trade:
          type: ["string", "null"]

    ChatInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1

    ChatResponse:
      type: object
      required: [answer, citations]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        usedInternalKnowledge:
          type: boolean

    Citation:
      type: object
      required: [videoId, videoTitle, startTime, endTime, text]
      properties:
        videoId:
          type: string
        videoTitle:
          type: string
        startTime:
          type: number
        endTime:
          type: number
        text:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        sourceType:
          type: string
          enum: [video, knowledge]
          description: >-
            Origin of the citation. "video" (the default when omitted) cites a
            transcript segment. "knowledge" cites a non-video Knowledge Entry —
            for these, videoTitle carries the entry title, text carries a
            snippet, thumbnailUrl carries the entry image, startTime/endTime are
            0, entryId identifies the entry, and videoId is empty (there is no
            clip to jump to).
        entryId:
          type: ["string", "null"]
          description: Knowledge Entry id when sourceType is "knowledge".

    ChatMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        createdAt:
          type: string

    Competency:
      type: object
      required: [code, name, trade]
      properties:
        code:
          type: string
        name:
          type: string
        trade:
          type: string
        description:
          type: ["string", "null"]
        videoCount:
          type: integer

    UploadUrlRequest:
      type: object
      required: [filename, contentType]
      properties:
        filename:
          type: string
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadUrl, path]
      properties:
        uploadUrl:
          type: string
        path:
          type: string
        token:
          type: ["string", "null"]

    VerificationUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [verified, rejected, unverified]

    KnowledgeNode:
      type: object
      required:
        [id, kind, label, description, confidence, verificationStatus, meta, createdAt, updatedAt]
      properties:
        id:
          type: string
        kind:
          type: string
          enum:
            [
              core,
              topic,
              competency,
              video,
              mentor,
              concept,
              tool,
              equipment,
              material,
              procedure,
              hazard,
              slang,
              certification,
              standard,
              regional_term,
            ]
        label:
          type: string
        trade:
          type: ["string", "null"]
        refId:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        verificationStatus:
          type: string
        meta:
          type: object
          additionalProperties: true
        createdAt:
          type: string
        updatedAt:
          type: string

    KnowledgeEdge:
      type: object
      required: [id, source, target, kind, meta]
      properties:
        id:
          type: string
        source:
          type: string
        target:
          type: string
        kind:
          type: string
        weight:
          type: number
        meta:
          type: object
          additionalProperties: true

    KnowledgeGraph:
      type: object
      required: [nodes, edges, counts, generatedAt]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeEdge"
        counts:
          type: object
          required: [nodes, edges, topics, competencies, videos, knowledge]
          properties:
            nodes:
              type: integer
            edges:
              type: integer
            topics:
              type: integer
            competencies:
              type: integer
            videos:
              type: integer
            knowledge:
              type: integer
        generatedAt:
          type: string

    MentorProfile:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        trade:
          type: ["string", "null"]
        tradeInput:
          type: ["string", "null"]
        yearsExperience:
          type: ["integer", "null"]
        specialties:
          type: array
          items:
            type: string
        region:
          type: ["string", "null"]
        background:
          type: ["string", "null"]
        createdAt:
          type: string

    StartInterviewInput:
      type: object
      required: [name, trade]
      properties:
        name:
          type: string
          description: The mentor's name
        trade:
          type: string
          description: Selected trade (e.g. Welding, Heavy Equipment Operator, Other)
        tradeInput:
          type: ["string", "null"]
          description: Free-text trade when "Other" is selected
        yearsExperience:
          type: ["integer", "null"]
        specialties:
          type: array
          items:
            type: string
        region:
          type: ["string", "null"]
        background:
          type: ["string", "null"]

    SubmitAnswerInput:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
          description: The mentor's verbatim answer to the current question

    InterviewSession:
      type: object
      required:
        [id, mentorProfileId, mentorName, status, questionCount, complete, createdAt]
      properties:
        id:
          type: string
        mentorProfileId:
          type: string
        mentorName:
          type: string
        trade:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, completed]
        currentQuestion:
          type: ["string", "null"]
        currentCategory:
          type: ["string", "null"]
        currentTopic:
          type: ["string", "null"]
        questionCount:
          type: integer
        complete:
          type: boolean
          description: True when there are no further questions (interview finished)
        createdAt:
          type: string

    InterviewAnswer:
      type: object
      required: [id, question, skipped, createdAt]
      properties:
        id:
          type: string
        question:
          type: string
        category:
          type: ["string", "null"]
        topic:
          type: ["string", "null"]
        answerText:
          type: ["string", "null"]
        skipped:
          type: boolean
        distillationStatus:
          type: string
          enum: [pending, verified, failed]
          description: >-
            Whether this answer's knowledge write was verified to have landed in
            the graph. pending = skipped or not yet distilled; failed = surfaced
            on the Graph Health dashboard for redistillation.
        extractedKnowledge:
          type: array
          description: >-
            Snapshot of the concepts this answer distilled into, taken at
            submission time. Empty for skipped or not-yet-distilled answers.
            Used to rebuild the transcript when an interview is resumed.
          items:
            $ref: "#/components/schemas/ExtractedKnowledgeItem"
        createdAt:
          type: string

    InterviewSessionDetail:
      type: object
      required: [session, answers]
      description: >-
        An interview session together with its ordered prior answers, so a client
        can rebuild the running transcript and resume an interrupted interview.
      properties:
        session:
          $ref: "#/components/schemas/InterviewSession"
        answers:
          type: array
          description: The session's answers in ask order (oldest first).
          items:
            $ref: "#/components/schemas/InterviewAnswer"

    MentorActiveSession:
      type: object
      description: >-
        A mentor's active (incomplete) interview session, if one exists.
        `session` is omitted when the mentor has no interview in progress.
      properties:
        session:
          $ref: "#/components/schemas/InterviewSession"

    ExtractedKnowledgeItem:
      type: object
      required: [id, title, category, confidence]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        confidence:
          type: number
        competencyCode:
          type: ["string", "null"]
        outcome:
          type: string
          enum: [reinforced, created, queued]
          description: >-
            How this concept landed in the knowledge graph: reinforced an
            existing concept, created a new concept, or queued as a pending
            candidate for review.
        matchedLabel:
          type: ["string", "null"]
          description: Label of the existing concept this item reinforced, if any.

    KnowledgeCandidateMatch:
      type: object
      required: [nodeId, label, similarity]
      properties:
        nodeId:
          type: string
        label:
          type: string
        similarity:
          type: number
        validity:
          type: string
          enum: [live, redirected, gone]
          description: >-
            Read-time annotation of whether this recorded match still exists in
            the live graph: live — usable as-is; redirected — absorbed into
            another concept (see currentNodeId/currentLabel); gone — no longer
            exists and left no redirect trail.
        currentNodeId:
          type: ["string", "null"]
          description: The node this match currently resolves to (itself when live, the survivor when redirected).
        currentLabel:
          type: ["string", "null"]

    KnowledgeCandidate:
      type: object
      required: [id, status, title, category, bestMatches]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected, merged, archived, restored]
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        trade:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        competencyCode:
          type: ["string", "null"]
        mentorProfileId:
          type: ["string", "null"]
        mentorName:
          type: ["string", "null"]
        answerId:
          type: ["string", "null"]
        sessionId:
          type: ["string", "null"]
        bestMatches:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeCandidateMatch"
        createdAt:
          type: ["string", "null"]
        resolvedTargetId:
          type: ["string", "null"]
          description: The canonical concept node reinforced by an accept/merge resolution.
        resolutionReason:
          type: ["string", "null"]
          description: The reviewer's reason, recorded on reject.
        resolvedAt:
          type: ["string", "null"]
        requestedTargetId:
          type: ["string", "null"]
          description: The target the reviewer originally asked for (accept/merge only).
        redirectReason:
          type: ["string", "null"]
          description: >-
            Why the recorded resolvedTargetId differs from requestedTargetId —
            set when the requested concept was merged away or re-matched by
            content at resolution time; null when the target was used as-is.

    CandidateResolutionInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, merge, reject, restore, rearchive]
          description: >-
            accept — reinforce the top best-match concept; merge — reinforce the
            reviewer-chosen targetNodeId; reject — discard with a required reason;
            restore — re-mint an archived (mentor-withdrawn) concept as
            attribution-free unverified knowledge; rearchive — undo a restore,
            demoting the curated concept back to an archived candidate (removing
            the sourceless node from the live graph, or dropping only the
            reviewer's curated vouch if a video/mentor re-taught it meanwhile).
        targetNodeId:
          type: string
          description: The existing concept to merge into (required for merge).
        reason:
          type: string
          description: Why the candidate was rejected (required for reject).

    CandidateResolutionConflict:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string
          enum: [already_resolved, target_gone]
        bestMatches:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeCandidateMatch"
          description: Fresh near matches from the live graph (target_gone only).

    KnowledgeCandidateList:
      type: object
      required: [candidates, total]
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeCandidate"
        total:
          type: integer

    MentorSummary:
      type: object
      required: [id, name, sessionCount, answerCount, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        trade:
          type: ["string", "null"]
        tradeInput:
          type: ["string", "null"]
          description: What the mentor typed for their trade, before normalization.
        yearsExperience:
          type: ["number", "null"]
        region:
          type: ["string", "null"]
        specialties:
          type: array
          items:
            type: string
        sessionCount:
          type: integer
          description: Interview sessions this mentor has started.
        answerCount:
          type: integer
          description: Verbatim answers recorded (skips excluded).
        createdAt:
          type: string

    MentorList:
      type: object
      required: [mentors, total]
      properties:
        mentors:
          type: array
          items:
            $ref: "#/components/schemas/MentorSummary"
        total:
          type: integer

    MentorWithdrawalResult:
      type: object
      required:
        [mentorProfileId, conceptsRetained, conceptsArchived, candidatesDeleted, candidatesScrubbed]
      properties:
        mentorProfileId:
          type: string
        conceptsRetained:
          type: integer
          description: Concepts kept alive on surviving evidence, aggregates recomputed.
        conceptsArchived:
          type: integer
          description: Mentor-only concepts demoted to archived candidates (out of the live graph).
        candidatesDeleted:
          type: integer
          description: Pending knowledge candidates from this mentor that were removed.
        candidatesScrubbed:
          type: integer
          description: Resolved candidates that kept their audit record but lost all mentor attribution.

    MentorWithdrawalPreviewConcept:
      type: object
      required: [id, label, category]
      properties:
        id:
          type: string
        label:
          type: string
        category:
          type: string
          description: The concept's knowledge kind (concept, tool, hazard, …).

    MentorWithdrawalPreview:
      type: object
      required:
        [
          mentorProfileId,
          conceptsRetained,
          conceptsArchived,
          candidatesDeleted,
          candidatesScrubbed,
          archivedConcepts,
        ]
      properties:
        mentorProfileId:
          type: string
        conceptsRetained:
          type: integer
          description: Concepts that would stay in the graph on surviving evidence.
        conceptsArchived:
          type: integer
          description: Mentor-only concepts that would be demoted to archived candidates.
        candidatesDeleted:
          type: integer
          description: Pending knowledge candidates from this mentor that would be removed.
        candidatesScrubbed:
          type: integer
          description: Resolved candidates that would keep their audit record but lose mentor attribution.
        archivedConcepts:
          type: array
          description: The mentor-only concepts that would leave the live graph, for admin review.
          items:
            $ref: "#/components/schemas/MentorWithdrawalPreviewConcept"

    InterviewTurnResult:
      type: object
      required: [session, answer, extractedKnowledge]
      properties:
        session:
          $ref: "#/components/schemas/InterviewSession"
        answer:
          $ref: "#/components/schemas/InterviewAnswer"
        extractedKnowledge:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedKnowledgeItem"

    RedistillAnswerResult:
      type: object
      required: [answer, extractedKnowledge]
      properties:
        answer:
          $ref: "#/components/schemas/InterviewAnswer"
        extractedKnowledge:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedKnowledgeItem"

    WriteCheck:
      type: object
      required: [ok, detail]
      properties:
        ok:
          type: boolean
        detail:
          type: string

    GraphWriteChecks:
      type: object
      required:
        [nodesExist, edgesExist, provenanceStored, confidenceUpdated, searchIndexUpdated]
      properties:
        nodesExist:
          $ref: "#/components/schemas/WriteCheck"
        edgesExist:
          $ref: "#/components/schemas/WriteCheck"
        provenanceStored:
          $ref: "#/components/schemas/WriteCheck"
        confidenceUpdated:
          $ref: "#/components/schemas/WriteCheck"
        searchIndexUpdated:
          $ref: "#/components/schemas/WriteCheck"

    GraphHealthWrite:
      type: object
      required: [id, scope, refId, status, attempts, checks]
      properties:
        id:
          type: string
        scope:
          type: string
        refId:
          type: string
        status:
          type: string
          enum: [verified, partial, failed, pending]
        error:
          type: ["string", "null"]
        durationMs:
          type: ["number", "null"]
        attempts:
          type: number
        updatedAt:
          type: ["string", "null"]
        checks:
          $ref: "#/components/schemas/GraphWriteChecks"

    GraphHealthReport:
      type: object
      required: [counts, retryQueue, avgProcessingMs, recentWrites]
      properties:
        counts:
          type: object
          required: [verified, partial, failed, pending, total]
          properties:
            verified:
              type: number
            partial:
              type: number
            failed:
              type: number
            pending:
              type: number
            total:
              type: number
        retryQueue:
          type: object
          required: [videos, answers, total]
          properties:
            videos:
              type: number
            answers:
              type: number
            total:
              type: number
        avgProcessingMs:
          type: ["number", "null"]
        recentWrites:
          type: array
          items:
            $ref: "#/components/schemas/GraphHealthWrite"

    ParkedThoughtContextItem:
      type: object
      required: [role, text]
      properties:
        role:
          type: string
          enum: [user, assistant]
        text:
          type: string
          maxLength: 2000
        at:
          type: ["string", "null"]

    ParkThoughtInput:
      type: object
      required: [source, context]
      properties:
        source:
          type: string
          enum: [chat, interview]
        interviewSessionId:
          type: ["string", "null"]
          description: >-
            Required when source is "interview"; ignored otherwise. The server
            derives mentorProfileId/trade/topic from this session — client-
            supplied values for those fields are never trusted for
            interview-sourced rows.
        context:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/ParkedThoughtContextItem"
          description: >-
            Recent turns captured at park time. Capped to 5 items of up to
            2000 characters each.
        unfinishedThought:
          type: ["string", "null"]
          maxLength: 2000
        reason:
          type: ["string", "null"]
          maxLength: 500
        topic:
          type: ["string", "null"]
          maxLength: 200
          description: Chat-sourced only; ignored for interview (derived from the session).
        category:
          type: ["string", "null"]
          maxLength: 200
          description: Chat-sourced only; ignored for interview (derived from the session).

    ParkedThought:
      type: object
      required: [id, source, title, summary, status, createdAt]
      properties:
        id:
          type: string
        source:
          type: string
          enum: [chat, interview]
        interviewSessionId:
          type: ["string", "null"]
        mentorProfileId:
          type: ["string", "null"]
        mentorName:
          type: ["string", "null"]
        trade:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        topic:
          type: ["string", "null"]
        title:
          type: string
        summary:
          type: string
        unfinishedThought:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]
        context:
          type: array
          items:
            $ref: "#/components/schemas/ParkedThoughtContextItem"
        status:
          type: string
          enum: [parked, resumed, resolved]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    ParkedThoughtList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ParkedThought"
